$kind: http-request
url: "{{base_url}}/caja/suministros"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{token_caja}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Suministros visibles para caja', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 4000
