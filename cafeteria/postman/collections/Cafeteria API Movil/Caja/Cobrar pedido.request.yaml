$kind: http-request
url: "{{base_url}}/caja/pedidos/{{id_pedido}}/cobrar"
method: PUT
auth:
  type: bearer
  credentials:
    token: "{{token_caja}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Pedido cobrado', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 3000
