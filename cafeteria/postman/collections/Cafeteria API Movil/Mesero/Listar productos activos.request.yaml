$kind: http-request
url: "{{base_url}}/productos/?activo=true"
method: GET
queryParams:
  activo: "true"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Productos activos disponibles', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 2000
