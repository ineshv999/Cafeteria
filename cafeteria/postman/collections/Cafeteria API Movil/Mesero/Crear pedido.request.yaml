$kind: http-request
url: "{{base_url}}/pedidos/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id_mesa": {{id_mesa}}
    }
auth:
  type: bearer
  credentials:
    token: "{{token_mesero}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Pedido creado', function () {
        pm.response.to.have.status(200);
      });
      const data = pm.response.json();
      pm.environment.set('id_pedido', data.id_pedido);
    language: text/javascript
order: 3000
