$kind: http-request
url: "{{base_url}}/cocina/pedidos/{{id_pedido}}/listo"
method: PUT
auth:
  type: bearer
  credentials:
    token: "{{token_cocina}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Pedido listo', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 4000
