$kind: http-request
url: "{{base_url}}/cocina/pedidos/{{id_pedido}}/detalle"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{token_cocina}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Detalle visible para cocina', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 2000
