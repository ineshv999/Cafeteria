$kind: http-request
url: "{{base_url}}/cocina/suministros"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "nombre": "Leche demo {{$timestamp}}",
      "unidad_medida": "l",
      "stock": 5,
      "stock_minimo": 2,
      "activo": true
    }
auth:
  type: bearer
  credentials:
    token: "{{token_cocina}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Suministro creado por cocina', function () {
        pm.response.to.have.status(200);
      });
      const data = pm.response.json();
      pm.environment.set('id_ingrediente', data.id_ingrediente);
    language: text/javascript
order: 5300
