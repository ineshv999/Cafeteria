<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        {% block titulo %}
        CoffeeAdmin
        {% endblock %}

    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

    {% block css %}

    {% endblock %}

</head>

<body>

    <aside>

        <div class="sidebar-logo">

            <svg xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 stroke-width="2">

                <path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/>

            </svg>

            <h1>CoffeeAdmin</h1>

        </div>

        <ul class="sidebar-menu">

            <li class="sidebar-item active">

                <a href="{{ url_for('dashboard') }}">

                    Dashboard

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Usuarios

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Productos

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Categorías

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Mesas

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Pedidos

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Cocina

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Caja

                </a>

            </li>

            <li class="sidebar-item">

                <a href="#">

                    Estadísticas

                </a>

            </li>

            <li class="sidebar-item">

                <a href="{{ url_for('logout') }}">

                    Cerrar sesión

                </a>

            </li>

        </ul>

    </aside>

    <div class="main-wrapper">

        <header>

            <div class="user-profile-badge">

                <div class="user-avatar"></div>

                <div>

                    <strong>

                        {{ session["usuario"] }}

                    </strong>

                    <br>

                    <small>

                        {{ session["rol"] }}

                    </small>

                </div>

            </div>

        </header>

        <main class="content-body">

            {% block contenido %}

            {% endblock %}

        </main>

    </div>

</body>

</html>
