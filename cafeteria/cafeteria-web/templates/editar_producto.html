<form method="POST">

<input
name="nombre"
value="{{ producto.nombre }}">

<input
name="descripcion"
value="{{ producto.descripcion }}">

<input
type="number"
step="0.01"
name="precio"
value="{{ producto.precio }}">

<input
type="number"
name="stock"
value="{{ producto.stock }}">

<input
name="imagen"
value="{{ producto.imagen }}">

<select name="id_categoria">

{% for c in categorias %}

<option
value="{{ c.id_categoria }}"
{% if c.id_categoria == producto.id_categoria %}selected{% endif %}>

{{ c.nombre }}

</option>

{% endfor %}

</select>

<select name="activo">

<option value="true">Activo</option>

<option value="false">Inactivo</option>

</select>

<button>

Actualizar

</button>

</form>
